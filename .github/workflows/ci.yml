name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          AUTH_SECRET: test-secret-for-ci
          DATABASE_URL: file:./test.db

      - name: Check coverage thresholds
        run: |
          COVERAGE=$(node -e "
            const c = require('./coverage/coverage-summary.json');
            console.log(JSON.stringify({
              statements: c.total.statements.pct,
              branches: c.total.branches.pct,
              functions: c.total.functions.pct,
              lines: c.total.lines.pct
            }));
          ")
          echo "Coverage: $COVERAGE"
          LINES=$(echo $COVERAGE | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).lines)")
          echo "Line coverage: ${LINES}%"
          if (( $(echo "$LINES < 80" | bc -l) )); then
            echo "::error::Line coverage ${LINES}% is below 80% threshold"
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./test.db
