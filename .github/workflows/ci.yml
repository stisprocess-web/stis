name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint & Test (parallel)
        run: |
          npm run lint &
          LINT_PID=$!
          npm run test:coverage &
          TEST_PID=$!
          wait $LINT_PID || exit 1
          wait $TEST_PID || exit 1
        env:
          AUTH_SECRET: test-secret-for-ci
          DATABASE_URL: file:./test.db

      - name: Check coverage thresholds
        run: |
          LINES=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")
          echo "Line coverage: ${LINES}%"
          if (( $(echo "$LINES < 80" | bc -l) )); then
            echo "::error::Line coverage ${LINES}% is below 80% threshold"
            exit 1
          fi

      - name: Build for Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx @cloudflare/next-on-pages
        env:
          DATABASE_URL: file:./prod.db
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=stis
