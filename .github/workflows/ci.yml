name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Map changed source files to related test files
          RELATED_TESTS=""
          for f in $CHANGED; do
            base=$(basename "$f" | sed 's/\.\(ts\|tsx\)$//')
            matches=$(find src/__tests__ -name "${base}.test.*" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              RELATED_TESTS="$RELATED_TESTS $matches"
            fi
          done

          if [ -z "$RELATED_TESTS" ]; then
            echo "run_tests=false" >> $GITHUB_OUTPUT
          else
            RELATED_TESTS=$(echo "$RELATED_TESTS" | tr ' ' '\n' | sort -u | tr '\n' ' ')
            echo "run_tests=true" >> $GITHUB_OUTPUT
            echo "test_files=$RELATED_TESTS" >> $GITHUB_OUTPUT
          fi

          # Check if only non-code files changed (css, md, etc)
          CODE_CHANGED=$(echo "$CHANGED" | grep -E '\.(ts|tsx|js|jsx)$' | grep -v '\.test\.' || true)
          if [ -z "$CODE_CHANGED" ]; then
            echo "skip_lint=true" >> $GITHUB_OUTPUT
          else
            echo "skip_lint=false" >> $GITHUB_OUTPUT
          fi

      - name: Lint (only if code changed)
        if: steps.changes.outputs.skip_lint != 'true'
        run: npm run lint

      - name: Run related tests only
        if: steps.changes.outputs.run_tests == 'true'
        run: npx vitest run ${{ steps.changes.outputs.test_files }}
        env:
          AUTH_SECRET: test-secret-for-ci
          DATABASE_URL: file:./test.db

      - name: Build + Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx @cloudflare/next-on-pages
        env:
          DATABASE_URL: file:./prod.db
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=stis
